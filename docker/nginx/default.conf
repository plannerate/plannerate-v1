server {
    listen 80;
    server_name _;

    root /var/www/public;
    index index.php index.html;

    fastcgi_buffer_size 32k;
    fastcgi_buffers 16 32k;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Com `fastcgi_pass php:9000` literal, o nginx resolve o IP do php uma única
    # vez, no boot — e devolve 502 para sempre se o container php for recriado
    # (build, restart) e ganhar outro IP. Passando por variável, ele reconsulta
    # o DNS interno do Docker (127.0.0.11) a cada 10s.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location ~ \.php$ {
        set $upstream plannerate-php:9000;
        fastcgi_pass $upstream;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location ~ /\.ht {
        deny all;
    }
}