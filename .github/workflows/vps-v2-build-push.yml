name: vps-v2-build-push

on:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ vars.GHCR_REPO || github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve branch context
        id: context
        run: |
          set -euo pipefail

          BRANCH_NAME="${GITHUB_REF_NAME}"
          BRANCH_SLUG="$(echo "${BRANCH_NAME}" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9-]+/-/g; s/^-+//; s/-+$//; s/-+/-/g' | cut -c1-63)"

          if [[ -z "${BRANCH_SLUG}" ]]; then
            echo "Unable to derive BRANCH_SLUG from branch '${BRANCH_NAME}'"
            exit 1
          fi

          SHORT_SHA="${GITHUB_SHA:0:7}"
          DEPLOY_CHANNEL="${BRANCH_SLUG}"
          if [[ "${BRANCH_NAME}" == "dev" ]]; then
            DEPLOY_CHANNEL="staging"
          elif [[ "${BRANCH_NAME}" == "main" ]]; then
            DEPLOY_CHANNEL="production"
          fi

          MANIFEST_DOMAIN=""
          if [[ -f "vps-deployment-v2/manifest.env" ]]; then
            MANIFEST_DOMAIN="$(grep -E '^DOMAIN_LANDLORD=' vps-deployment-v2/manifest.env | tail -n1 | cut -d'=' -f2- | tr -d '"' | xargs || true)"
          fi
          if [[ -z "${MANIFEST_DOMAIN}" ]]; then
            echo "Missing DOMAIN_LANDLORD in vps-deployment-v2/manifest.env"
            exit 1
          fi

          TAG_CHANNEL_SHA="${DEPLOY_CHANNEL}-${SHORT_SHA}"
          TAG_CHANNEL_LATEST="branch-${DEPLOY_CHANNEL}-latest"

          {
            echo "branch_name=${BRANCH_NAME}"
            echo "branch_slug=${BRANCH_SLUG}"
            echo "deploy_channel=${DEPLOY_CHANNEL}"
            echo "short_sha=${SHORT_SHA}"
            echo "wayfinder_landlord_domain=${MANIFEST_DOMAIN}"
            echo "tag_channel_sha=${TAG_CHANNEL_SHA}"
            echo "tag_channel_latest=${TAG_CHANNEL_LATEST}"
          } >> "${GITHUB_OUTPUT}"

      - name: Prepare image tags
        id: tags
        run: |
          set -euo pipefail
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          {
            echo "value<<EOF"
            echo "${IMAGE}:${{ steps.context.outputs.tag_channel_sha }}"
            echo "${IMAGE}:${{ steps.context.outputs.tag_channel_latest }}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.prod
          push: true
          build-args: |
            WAYFINDER_LANDLORD_DOMAIN=${{ steps.context.outputs.wayfinder_landlord_domain }}
          tags: ${{ steps.tags.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
