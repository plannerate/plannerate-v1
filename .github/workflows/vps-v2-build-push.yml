name: vps-v2-build-push

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ vars.GHCR_REPO || github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve branch context
        id: context
        env:
          BASE_STAGING_DOMAIN: ${{ vars.BASE_STAGING_DOMAIN }}
        run: |
          set -euo pipefail

          if [[ -z "${BASE_STAGING_DOMAIN}" ]]; then
            echo "Missing vars.BASE_STAGING_DOMAIN"
            exit 1
          fi

          BRANCH_NAME="${GITHUB_REF_NAME}"
          BRANCH_SLUG="$(echo "${BRANCH_NAME}" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9-]+/-/g; s/^-+//; s/-+$//; s/-+/-/g' | cut -c1-63)"

          if [[ -z "${BRANCH_SLUG}" ]]; then
            echo "Unable to derive BRANCH_SLUG from branch '${BRANCH_NAME}'"
            exit 1
          fi

          SHORT_SHA="${GITHUB_SHA:0:7}"
          WAYFINDER_APP_URL="https://${BRANCH_SLUG}.${BASE_STAGING_DOMAIN}"

          TAG_SHA="sha-${SHORT_SHA}"
          TAG_BRANCH_SHA="${BRANCH_SLUG}-${SHORT_SHA}"
          TAG_BRANCH_LATEST="branch-${BRANCH_SLUG}-latest"

          {
            echo "branch_name=${BRANCH_NAME}"
            echo "branch_slug=${BRANCH_SLUG}"
            echo "short_sha=${SHORT_SHA}"
            echo "wayfinder_app_url=${WAYFINDER_APP_URL}"
            echo "tag_sha=${TAG_SHA}"
            echo "tag_branch_sha=${TAG_BRANCH_SHA}"
            echo "tag_branch_latest=${TAG_BRANCH_LATEST}"
          } >> "${GITHUB_OUTPUT}"

      - name: Prepare image tags
        id: tags
        run: |
          set -euo pipefail
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          {
            echo "value<<EOF"
            echo "${IMAGE}:${{ steps.context.outputs.tag_sha }}"
            echo "${IMAGE}:${{ steps.context.outputs.tag_branch_sha }}"
            echo "${IMAGE}:${{ steps.context.outputs.tag_branch_latest }}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.prod
          push: true
          build-args: |
            WAYFINDER_APP_URL=${{ steps.context.outputs.wayfinder_app_url }}
          tags: ${{ steps.tags.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
