# CI do domínio planograma — protege a suíte destravada na refatoração de 2026-06.
#
# Roda APENAS as suítes verdes do domínio (a suíte global tem ~270 falhas
# pré-existentes de outros domínios, nunca executadas antes do destravamento —
# ver docs/refatoracao-raptor-plannerate/fase-5-validacao-e-plano-de-limpeza.md).
# À medida que outros domínios forem triados, adicionar seus paths aqui.
#
# Os grupos rodam em invocações separadas de propósito: alguns testes fazem
# dropAllTables na conexão tenant e destroem o schema migrado de que outros
# (ex.: SegmentCopyChangeTest) dependem — processos separados isolam isso.

name: tests

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  planogram-domain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, intl, pdo, pdo_sqlite, sqlite3, gd, zip, bcmath, curl
          tools: composer:v2
          coverage: none

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare Environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: 'Tests — Unit (AutoPlanogram + pacote)'
        run: |
          php artisan test --compact \
            tests/Unit/Services/AutoPlanogram \
            tests/Unit/PlannerateEditorModelConnectionTest.php \
            tests/Unit/Packages \
            tests/Unit/Services/QRCodeServiceTest.php \
            tests/Unit/Events/GondolaProductImagesUpdatedTest.php

      - name: 'Tests — Feature (modo automático E2E)'
        run: |
          php artisan test --compact \
            tests/Feature/AutoPlanogram \
            tests/Feature/AutoPlanogramRegressionTest.php \
            tests/Feature/AutoPlanogramPlacementTest.php \
            tests/Feature/AutoPlanogramScoringTest.php \
            tests/Feature/AutoPlanogramSuggestionsTest.php \
            tests/Feature/AutoPlanogramPlacementOverlapTest.php \
            tests/Feature/AutoPlanogramTemplateGroupingsTest.php

      - name: 'Tests — Feature (editor, save-changes, settings)'
        run: |
          php artisan test --compact \
            tests/Feature/Plannerate/GondolaCreateModeTest.php \
            tests/Feature/Plannerate/PlanogramChangeServiceTest.php \
            tests/Feature/GondolaSlotOverrideTest.php \
            tests/Feature/Settings/PlanogramSettingsTest.php \
            tests/Feature/PlannerateEditorApiUploadImageRouteTest.php

      - name: 'Tests — Feature (save-changes com schema migrado)'
        run: php artisan test --compact tests/Feature/Plannerate/SegmentCopyChangeTest.php

  # Pipeline de importação de integrações (discover → fetch → process → persist →
  # reconcile → pós-import). Grupos em invocações separadas porque testes
  # config-override (database.default + DB::purge) contaminam a conexão dos
  # vizinhos — cada `php artisan test` é um processo novo, isolando o estado.
  integration-import:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, intl, pdo, pdo_sqlite, sqlite3, gd, zip, bcmath, curl
          tools: composer:v2
          coverage: none

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare Environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: 'Import — core pipeline (fetch → process → reconcile → E2E)'
        run: |
          php artisan test --compact \
            tests/Feature/Integrations/ImportPipelineEndToEndTest.php \
            tests/Feature/Integrations/IntegrationHealthCommandTest.php \
            tests/Feature/Integrations/IntegrationImportRunTest.php \
            tests/Feature/Integrations/ImportRunReconcilerTest.php \
            tests/Feature/Integrations/BackfillIntegrationCommandTest.php \
            tests/Feature/Integrations/FetchIntegrationPageJobRetryTest.php \
            tests/Feature/Integrations/FetchIntegrationPageJobExtensionTest.php \
            tests/Feature/Integrations/ProcessPageResponseJobQuarantineTest.php \
            tests/Feature/Integrations/RunDailyPostImportCommandTest.php \
            tests/Feature/Integrations/PruneImportFilesCommandTest.php \
            tests/Feature/Integrations/DiscoverIntegrationPagesJobFailureTest.php \
            tests/Feature/Integrations/ImportDiscardMetricsTest.php \
            tests/Feature/Integrations/IntegrationHttpClientTokenCacheTest.php \
            tests/Feature/Integrations/CleanupCommandQueueGuardTest.php \
            tests/Feature/Integrations/ImportLegacyDimensionsToEanReferencesCommandTest.php \
            tests/Feature/Integrations/TenantEventTestCommandTest.php \
            tests/Feature/Integrations/TenantNaturalKeyReconcilerTest.php

      - name: 'Import — unit (mapping, id, persister, reconciler, http client)'
        run: |
          php artisan test --compact \
            tests/Unit/Services/Integrations \
            tests/Unit/Jobs/Integrations

      # Cada linha é um processo próprio: estes testes trocam database.default +
      # DB::purge, então contaminam-se se rodados na mesma invocação.
      - name: 'Import — pós-import (cleanup, link-sales, ean-refs; isolados)'
        run: |
          php artisan test --compact tests/Feature/Integrations/CleanupCommandTest.php
          php artisan test --compact tests/Feature/Integrations/CleanupCommandFreshnessGuardTest.php
          php artisan test --compact tests/Feature/Integrations/CleanupJobsCriteriaTest.php
          php artisan test --compact tests/Feature/Integrations/LinkSalesProductsCommandRelinkTest.php
          php artisan test --compact tests/Feature/Integrations/SyncProductsFromEanReferencesServiceChunkTest.php

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none

      # vendor/ é necessário: os aliases do Vite apontam para
      # vendor/callcocam/laravel-raptor-plannerate (path repo symlinkado)
      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist --no-scripts

      # resources/js/{actions,routes,wayfinder} NÃO são versionados (são gerados).
      # Gera aqui, antes de qualquer passo que consuma os imports de @/actions e
      # @/routes — ou seja, antes do vitest e do build. Espelha o estágio
      # `wayfinder` do Dockerfile.prod: o gerador só precisa de APP_KEY e
      # LANDLORD_DOMAIN (lê as rotas do artisan), nunca de banco.
      - name: Generate Wayfinder Actions
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan wayfinder:generate --with-form

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install Node Dependencies
        run: npm ci

      - name: 'Tests — JS (vitest)'
        run: npm run test:js

      # VITE_ENABLE_WAYFINDER=false: o plugin do Vite reexecutaria o gerador a
      # cada build; já geramos no passo acima.
      - name: Build Assets
        run: VITE_ENABLE_WAYFINDER=false npm run build

      # Informacional: 77 erros pré-existentes fora do escopo da refatoração.
      # Remover continue-on-error quando forem zerados.
      - name: Type Check (informacional)
        continue-on-error: true
        run: npm run types:check
