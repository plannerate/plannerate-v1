name: vps-v2-deploy-staging

on:
  workflow_run:
    workflows: ["vps-v2-build-push"]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to deploy (example sha-abcdef1)
        required: false
        default: latest
      app_slug:
        description: App slug/path (example staging, production, client-a)
        required: false
        default: staging

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'dev'
      )
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy app
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.APP_HOST }}
          username: ${{ secrets.APP_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            APP_SLUG="${{ github.event.inputs.app_slug }}"
            if [[ -z "${APP_SLUG}" || "${APP_SLUG}" == "null" ]]; then
              APP_SLUG="staging"
            fi
            APP_DIR="/opt/plannerate/${APP_SLUG}"
            cd "${APP_DIR}"
            IMAGE_TAG="${{ github.event.inputs.image_tag }}"
            if [[ -z "${IMAGE_TAG}" || "${IMAGE_TAG}" == "null" ]]; then
              HEAD_SHA="${{ github.event.workflow_run.head_sha }}"
              IMAGE_TAG="sha-${HEAD_SHA:0:7}"
            fi
            export IMAGE_TAG
            docker compose -p "plannerate-${APP_SLUG}" pull
            docker compose -p "plannerate-${APP_SLUG}" up -d --force-recreate
            migration_ok=0
            for attempt in 1 2 3 4 5; do
              if docker compose -p "plannerate-${APP_SLUG}" run --rm --no-deps -e BROADCAST_CONNECTION=log app php artisan migrate --force; then
                migration_ok=1
                echo "Migration succeeded on attempt ${attempt}"
                break
              fi
              echo "Migration failed on attempt ${attempt}; waiting before retry..."
              sleep 5
            done

            if [[ "${migration_ok}" -ne 1 ]]; then
              echo "Migration failed in ${APP_SLUG} after retries"
              docker compose -p "plannerate-${APP_SLUG}" logs app --tail=120 || true
              exit 1
            fi
            docker compose -p "plannerate-${APP_SLUG}" run --rm --no-deps -e BROADCAST_CONNECTION=log app sh -lc '
              php artisan config:clear
              php artisan cache:clear
              php artisan event:clear
              php artisan route:clear
            '
            docker compose -p "plannerate-${APP_SLUG}" ps

      - name: Health check (inside app container)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.APP_HOST }}
          username: ${{ secrets.APP_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            APP_SLUG="${{ github.event.inputs.app_slug }}"
            if [[ -z "${APP_SLUG}" || "${APP_SLUG}" == "null" ]]; then
              APP_SLUG="staging"
            fi
            APP_DIR="/opt/plannerate/${APP_SLUG}"
            cd "${APP_DIR}"
            docker compose -p "plannerate-${APP_SLUG}" exec -T app sh -lc '
              for attempt in 1 2 3 4 5; do
                if curl -fsS http://127.0.0.1/up >/dev/null; then
                  echo "Health check passed on /up (attempt ${attempt})"
                  exit 0
                fi
                echo "Health check /up failed (attempt ${attempt}), retrying..."
                sleep 3
              done

              if curl -fsSI http://127.0.0.1/ >/dev/null; then
                echo "Warning: /up failed but / responded successfully"
                exit 0
              fi

              echo "Health check failed for both /up and /"
              echo "---- /up response body ----"
              curl -sS http://127.0.0.1/up || true
              exit 1
            '
            echo "Health check finished inside app container for ${APP_SLUG}"
