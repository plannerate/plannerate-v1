name: vps-v2-deploy-staging

on:
  workflow_run:
    workflows: ["vps-v2-build-push"]
    types: [completed]
    branches:
      - dev
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to deploy (example sha-abcdef1). Leave empty to use workflow_run head SHA.
        required: false
        default: ""
      app_slug:
        description: App slug/path (example staging, production, client-a)
        required: false
        default: ""

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'dev'
      )
    runs-on: ubuntu-latest
    environment: staging
    concurrency:
      group: deploy-${{ github.event.inputs.app_slug || github.event.workflow_run.head_branch || github.ref_name }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve deploy context
        id: context
        run: |
          set -euo pipefail

          BRANCH_NAME="${{ github.ref_name }}"
          HEAD_SHA="${{ github.sha }}"
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            BRANCH_NAME="${{ github.event.workflow_run.head_branch }}"
            HEAD_SHA="${{ github.event.workflow_run.head_sha }}"
          fi

          BRANCH_SLUG="$(echo "${BRANCH_NAME}" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9-]+/-/g; s/^-+//; s/-+$//; s/-+/-/g' | cut -c1-63)"
          if [[ -z "${BRANCH_SLUG}" ]]; then
            echo "Unable to derive BRANCH_SLUG from branch '${BRANCH_NAME}'"
            exit 1
          fi

          DEFAULT_APP_SLUG=""
          if [[ -f "vps-deployment-v2/manifest.env" ]]; then
            DEFAULT_APP_SLUG="$(grep -E '^APP_SLUG=' vps-deployment-v2/manifest.env | tail -n1 | cut -d'=' -f2- | tr -d '"' | xargs || true)"
          fi
          if [[ -z "${DEFAULT_APP_SLUG}" ]]; then
            DEFAULT_APP_SLUG="staging"
          fi

          APP_SLUG="${{ github.event.inputs.app_slug }}"
          if [[ -z "${APP_SLUG}" || "${APP_SLUG}" == "null" ]]; then
            if [[ -n "${DEFAULT_APP_SLUG}" ]]; then
              APP_SLUG="${DEFAULT_APP_SLUG}"
            else
              APP_SLUG="staging"
            fi
          fi
          if [[ ! "${APP_SLUG}" =~ ^[a-z0-9-]{1,63}$ ]]; then
            echo "Invalid APP_SLUG '${APP_SLUG}'. Use [a-z0-9-], max 63 chars."
            exit 1
          fi

          IMAGE_TAG="${{ github.event.inputs.image_tag }}"
          if [[ -z "${IMAGE_TAG}" || "${IMAGE_TAG}" == "null" ]]; then
            IMAGE_TAG="${BRANCH_SLUG}-${HEAD_SHA:0:7}"
          fi

          {
            echo "branch_name=${BRANCH_NAME}"
            echo "branch_slug=${BRANCH_SLUG}"
            echo "app_slug=${APP_SLUG}"
            echo "image_tag=${IMAGE_TAG}"
          } >> "${GITHUB_OUTPUT}"

      - name: Deploy app
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.APP_HOST }}
          username: ${{ secrets.APP_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            echo "WORKFLOW_VERSION=vps-v2-deploy-staging-branch-aware-2026-05-03"

            BRANCH_NAME="${{ steps.context.outputs.branch_name }}"
            BRANCH_SLUG="${{ steps.context.outputs.branch_slug }}"
            APP_SLUG="${{ steps.context.outputs.app_slug }}"

            APP_DIR="/opt/plannerate/${APP_SLUG}"
            if [[ ! -d "${APP_DIR}" ]]; then
              echo "Missing APP_DIR '${APP_DIR}'. Provision this branch/app first."
              exit 1
            fi

            cd "${APP_DIR}"

            IMAGE_TAG="${{ steps.context.outputs.image_tag }}"

            echo "Deploy context:"
            echo "  branch_name=${BRANCH_NAME}"
            echo "  branch_slug=${BRANCH_SLUG}"
            echo "  app_slug=${APP_SLUG}"
            echo "  image_tag=${IMAGE_TAG}"

            export IMAGE_TAG
            docker compose -p "plannerate-${APP_SLUG}" pull
            docker compose -p "plannerate-${APP_SLUG}" up -d --force-recreate
            docker compose -p "plannerate-${APP_SLUG}" exec -T app sh -lc '
              mkdir -p storage/framework/views storage/framework/cache storage/framework/sessions bootstrap/cache
              chmod -R ug+rwX storage bootstrap/cache
              chown -R www-data:www-data storage bootstrap/cache 2>/dev/null || true
            '
            docker compose -p "plannerate-${APP_SLUG}" exec -T app sh -lc '
              set -e
              php artisan optimize:clear
            '
            docker compose -p "plannerate-${APP_SLUG}" exec -T app sh -lc '
              set -e
              if [ ! -f .env ]; then
                echo "Missing .env in ${PWD}. Expected deploy env file."
                exit 1
              fi

              missing=0
              for key in DB_CONNECTION DB_DATABASE DB_LANDLORD_CONNECTION DB_LANDLORD_DATABASE; do
                if ! grep -q "^${key}=" .env; then
                  echo "Missing ${key} in .env"
                  missing=1
                fi
              done

              if [ "${missing}" -ne 0 ]; then
                echo "Invalid .env for deployment. Expected landlord DB settings."
                exit 1
              fi

              echo "Deployment DB settings:"
              grep -E "^(DB_CONNECTION|DB_DATABASE|DB_LANDLORD_CONNECTION|DB_LANDLORD_DATABASE)=" .env
            '
            migration_ok=0
            for attempt in 1 2 3 4 5; do
              if docker compose -p "plannerate-${APP_SLUG}" exec -T app sh -lc '
                set -e
                php artisan migrate --force --database=landlord --path=database/migrations/landlord
              '; then
                migration_ok=1
                echo "Migration succeeded on attempt ${attempt}"
                break
              fi
              echo "Migration failed on attempt ${attempt}; waiting before retry..."
              sleep 5
            done

            if [[ "${migration_ok}" -ne 1 ]]; then
              echo "Migration failed in ${APP_SLUG} after retries"
              docker compose -p "plannerate-${APP_SLUG}" logs app --tail=120 || true
              exit 1
            fi
            docker compose -p "plannerate-${APP_SLUG}" exec -T app sh -lc '
              php artisan config:clear
              php artisan cache:clear
              php artisan event:clear
              php artisan route:clear
            '
            docker compose -p "plannerate-${APP_SLUG}" ps

      - name: Health check (inside app container)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.APP_HOST }}
          username: ${{ secrets.APP_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            APP_SLUG="${{ steps.context.outputs.app_slug }}"
            APP_DIR="/opt/plannerate/${APP_SLUG}"
            if [[ ! -d "${APP_DIR}" ]]; then
              echo "Missing APP_DIR '${APP_DIR}'."
              exit 1
            fi
            cd "${APP_DIR}"
            health_ok=0
            for outer_attempt in 1 2 3 4 5; do
              if docker compose -p "plannerate-${APP_SLUG}" exec -T app sh -lc '
                for attempt in 1 2 3 4 5; do
                  if curl -fsS http://127.0.0.1/up >/dev/null; then
                    echo "Health check passed on /up (attempt ${attempt})"
                    exit 0
                  fi
                  echo "Health check /up failed (attempt ${attempt}), retrying..."
                  sleep 3
                done

                if curl -fsSI http://127.0.0.1/ >/dev/null; then
                  echo "Warning: /up failed but / responded successfully"
                  exit 0
                fi

                echo "Health check failed for both /up and /"
                echo "---- /up response body ----"
                curl -sS http://127.0.0.1/up || true
                exit 1
              '; then
                health_ok=1
                break
              fi

              echo "Health check command failed at container level (attempt ${outer_attempt}), retrying..."
              docker compose -p "plannerate-${APP_SLUG}" ps || true
              sleep 4
            done

            if [[ "${health_ok}" -ne 1 ]]; then
              echo "Health check failed after retries"
              docker compose -p "plannerate-${APP_SLUG}" logs app --tail=120 || true
              exit 1
            fi
            echo "Health check finished inside app container for ${APP_SLUG}"
