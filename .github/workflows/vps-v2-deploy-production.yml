name: vps-v2-deploy-production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to deploy (example sha-abcdef1)
        required: true
        default: latest

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy production
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.APP_HOST }}
          username: ${{ secrets.APP_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd /opt/production
            export IMAGE_TAG=${{ github.event.inputs.image_tag }}
            docker compose pull
            docker compose up -d --force-recreate
            docker compose run --rm --no-deps -e BROADCAST_CONNECTION=log app php artisan migrate --force
            docker compose run --rm --no-deps -e BROADCAST_CONNECTION=log app php artisan optimize:clear
            docker compose ps

      - name: Health check
        run: curl -fsS https://${{ secrets.DOMAIN }}/up
