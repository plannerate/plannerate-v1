name: vps-v2-rollback

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Previous image tag (example sha-abcdef1)
        required: true
      app_slug:
        description: App slug/path (example staging, production, client-a)
        required: false
        default: staging

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Rollback deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.APP_HOST }}
          username: ${{ secrets.APP_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            APP_SLUG="${{ github.event.inputs.app_slug }}"
            if [[ -z "${APP_SLUG}" || "${APP_SLUG}" == "null" ]]; then
              APP_SLUG="staging"
            fi
            APP_DIR="/opt/plannerate/${APP_SLUG}"
            cd "${APP_DIR}"
            export IMAGE_TAG=${{ github.event.inputs.image_tag }}
            docker compose -p "plannerate-${APP_SLUG}" pull
            docker compose -p "plannerate-${APP_SLUG}" up -d --force-recreate
            docker compose -p "plannerate-${APP_SLUG}" exec -T app sh -lc '
              mkdir -p storage/framework/views storage/framework/cache storage/framework/sessions bootstrap/cache
              chmod -R ug+rwX storage bootstrap/cache
              chown -R www-data:www-data storage bootstrap/cache 2>/dev/null || true
            '
            docker compose -p "plannerate-${APP_SLUG}" exec -T app sh -lc '
              set -e
              php artisan migrate --force --database=landlord --path=database/migrations/landlord

              set +e
              TENANTS_OUTPUT="$(php artisan tenants:artisan "migrate --force --database=tenant" 2>&1)"
              TENANTS_STATUS=$?
              set -e

              if [ "${TENANTS_STATUS}" -ne 0 ]; then
                if echo "${TENANTS_OUTPUT}" | grep -q "No tenant(s) found."; then
                  echo "No tenants found yet; skipping tenant migrations."
                else
                  echo "${TENANTS_OUTPUT}"
                  exit "${TENANTS_STATUS}"
                fi
              else
                echo "${TENANTS_OUTPUT}"
              fi
            '
            docker compose -p "plannerate-${APP_SLUG}" exec -T app sh -lc '
              php artisan config:clear
              php artisan cache:clear
              php artisan event:clear
              php artisan route:clear
            '
            docker compose -p "plannerate-${APP_SLUG}" ps

      - name: Health check (inside app container)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.APP_HOST }}
          username: ${{ secrets.APP_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            APP_SLUG="${{ github.event.inputs.app_slug }}"
            if [[ -z "${APP_SLUG}" || "${APP_SLUG}" == "null" ]]; then
              APP_SLUG="staging"
            fi
            APP_DIR="/opt/plannerate/${APP_SLUG}"
            cd "${APP_DIR}"
            docker compose -p "plannerate-${APP_SLUG}" exec -T app sh -lc 'curl -fsS http://127.0.0.1/up >/dev/null'
            echo "Health check passed inside app container for ${APP_SLUG}"
