name: Build and Push Docker Images

on:
  push:
    branches:
      - 'feature/**'
      - feature/pkg-laravel-raptor-plannerate
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v6

      - name: 🔑 Login no GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📝 Extrair metadados Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-

      - name: 🏗️ Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: � Preparar secrets do build
        id: prep_secrets
        env:
          VITE_PUSHER_APP_KEY: ${{ secrets.VITE_PUSHER_APP_KEY }}
          COMPOSER_GITHUB_TOKEN: ${{ secrets.COMPOSER_GITHUB_TOKEN }}
        run: |
          SECRETS=""
          [ -n "$VITE_PUSHER_APP_KEY" ] && SECRETS="${SECRETS}vite_pusher_app_key=${VITE_PUSHER_APP_KEY}"$'\n'
          [ -n "$COMPOSER_GITHUB_TOKEN" ] && SECRETS="${SECRETS}composer_github_token=${COMPOSER_GITHUB_TOKEN}"$'\n'
          {
            echo 'value<<SECRETS_DELIMITER'
            printf '%s' "$SECRETS"
            echo 'SECRETS_DELIMITER'
          } >> "$GITHUB_OUTPUT"

      - name: 🐳 Build e Push da imagem
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          secrets: ${{ steps.prep_secrets.outputs.value }}

      - name: ✅ Imagem publicada
        run: |
          echo "::notice::Imagem Docker publicada com sucesso!"
          echo "Tags: ${{ steps.meta.outputs.tags }}"