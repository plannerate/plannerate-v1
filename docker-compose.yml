 
services:

  nginx:
    image: nginx:alpine

    depends_on:
      - php

    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      - "traefik.http.routers.app.rule=Host(`plannerate.localhost`) || HostRegexp(`{subdomain:.+}.plannerate.localhost`)"
      - "traefik.http.routers.app.priority=1"
      - "traefik.http.services.app.loadbalancer.server.port=80"

    networks:
      - web

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    user: "1000:1000"

    volumes:
      - ./:/var/www

    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      mysql:
        condition: service_started

    extra_hosts:
      - "base-teste-api.localhost:host-gateway"

    working_dir: /var/www

    networks:
      - web

  horizon:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    user: "1000:1000"

    command: php artisan horizon

    volumes:
      - ./:/var/www

    depends_on:
      - redis
      - php

    extra_hosts:
      - "base-teste-api.localhost:host-gateway"

    working_dir: /var/www

    networks:
      - web

  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    user: "1000:1000"

    command: php artisan reverb:start --host=0.0.0.0 --port=8080

    volumes:
      - ./:/var/www

    depends_on:
      - redis

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      - "traefik.http.routers.reverb.rule=Host(`ws.plannerate.localhost`)"
      - "traefik.http.routers.reverb.priority=100"
      - "traefik.http.services.reverb.loadbalancer.server.port=8080"

    working_dir: /var/www

    networks:
      - web

  postgres:
    image: postgres:17

    environment:
      POSTGRES_DB: landlord
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

    networks:
      - web

  pgadmin:
    image: dpage/pgadmin4:9.14

    depends_on:
      - postgres

    environment:
      PGADMIN_DEFAULT_EMAIL: '${PGADMIN_DEFAULT_EMAIL:-admin@plannerate.com}'
      PGADMIN_DEFAULT_PASSWORD: '${PGADMIN_DEFAULT_PASSWORD:-password}'

    volumes:
      - pgadmin_data:/var/lib/pgadmin

    ports:
      - "5050:80"

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      - "traefik.http.routers.pgadmin.rule=Host(`pgadmin.plannerate.localhost`)"
      - "traefik.http.routers.pgadmin.priority=100"
      - "traefik.http.services.pgadmin.loadbalancer.server.port=80"

    networks:
      - web

  mysql:
    image: mysql:8.0

    command: --default-authentication-plugin=mysql_native_password

    environment:
      MYSQL_ROOT_PASSWORD: '${MYSQL_ROOT_PASSWORD:-root}'
      MYSQL_DATABASE: '${MYSQL_DATABASE:-legacy}'
      MYSQL_USER: '${MYSQL_USER:-root}'
      MYSQL_PASSWORD: '${MYSQL_PASSWORD:-password}'

    volumes:
      - mysql_data:/var/lib/mysql

    ports:
      - "3306:3306"

    networks:
      - web

  phpmyadmin:
    image: phpmyadmin:latest

    depends_on:
      - mysql

    environment:
      PMA_HOST: '${PMA_HOST:-mysql}'
      PMA_PORT: '${PMA_PORT:-3306}'
      PMA_USER: '${PMA_USER:-root}'
      PMA_PASSWORD: '${PMA_PASSWORD:-root}'
      UPLOAD_LIMIT: '${PHPMYADMIN_UPLOAD_LIMIT:-256M}'
    ports:
      - "8081:80"


    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      - "traefik.http.routers.phpmyadmin.rule=Host(`phpmyadmin.plannerate.localhost`)"
      - "traefik.http.routers.phpmyadmin.priority=100"
      - "traefik.http.services.phpmyadmin.loadbalancer.server.port=80"

    networks:
      - web

  redis:
    image: redis:7-alpine

    command: redis-server --appendonly yes

    volumes:
      - redis_data:/data

    ports:
      - "6379:6379"

    networks:
      - web

  mailpit:
    image: axllent/mailpit

    ports:
      - "1025:1025"
      - "8025:8025"

    networks:
      - web

volumes:
  postgres_data:
  pgadmin_data:
  mysql_data:
  redis_data:

networks:
  web:
    external: true
    name: web
