name: plannerate-v1

# Postgres, Redis, Mailpit e pgAdmin NÃO vivem aqui — são compartilhados entre
# todos os projetos e sobem uma vez só em ~/docker/shared. Este compose declara
# apenas o que é do projeto (php, nginx, horizon, reverb).
#
# Pré-requisito:  cd ~/docker/shared && docker compose up -d
# Provisionamento: ~/docker/shared/newdb.sh plannerate-v1 --createdb
#
#   O --createdb é obrigatório AQUI: este projeto é multi-tenant com um banco
#   por tenant, e quem cria o banco `tenant_<slug>` é a própria aplicação, em
#   runtime (ProvisionTenantDatabaseJob). Sem CREATEDB no role, cadastrar um
#   tenant novo falha.
#
# O shared-postgres usa a imagem pgvector/pgvector:pg17 — a extensão `vector`
# que este projeto precisa está lá.
#
# O MySQL também é compartilhado. A conexão `mysql_legacy` (usada pelo
# ImportLegacyProductsCommand) aponta para o `shared-mysql`, database `legacy` —
# uma cópia local do banco `base` da VPS 177.7.58.29, baixada em 2026-07-13.
#
# Antes ela apontava direto para a VPS. Trabalhar contra a cópia local evita
# rodar importação em cima do banco de produção; os valores originais estão
# comentados no .env, se precisar voltar. Para atualizar a cópia:
#
#   docker exec shared-mysql mysqldump -h177.7.58.29 -upma -p<senha> \
#       --single-transaction --skip-lock-tables --no-tablespaces \
#       --column-statistics=0 base | docker exec -i shared-mysql mysql -uroot -proot legacy

services:

  nginx:
    image: nginx:alpine

    depends_on:
      - php

    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    restart: unless-stopped

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      # O HostRegexp é o que faz os subdomínios de tenant caírem aqui — é assim
      # que o DomainTenantWithDomainsFinder identifica o tenant.
      - "traefik.http.routers.plannerate-web.rule=Host(`plannerate.localhost`) || HostRegexp(`{subdomain:.+}.plannerate.localhost`)"
      - "traefik.http.routers.plannerate-web.priority=1"
      - "traefik.http.services.plannerate-web.loadbalancer.server.port=80"

    networks:
      - web

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    user: "1000:1000"

    volumes:
      - ./:/var/www

    extra_hosts:
      - "base-teste-api.localhost:host-gateway"

    working_dir: /var/www

    restart: unless-stopped

    networks:
      # Alias único: os três projetos têm um serviço chamado `php`, e todos estão
      # na rede `web`. Sem isto, os três respondem pelo mesmo nome `php` e o DNS
      # do Docker faz round-robin — o nginx de um projeto acaba falando com o
      # php-fpm de outro, servindo o app errado.
      web:
        aliases:
          - plannerate-php

  # Horizon: gerencia as filas do redis. É ele quem processa o
  # ProvisionTenantDatabaseJob — sem Horizon no ar, um tenant novo fica preso
  # em `status = provisioning` para sempre.
  horizon:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    user: "1000:1000"

    command: php artisan horizon

    volumes:
      - ./:/var/www

    depends_on:
      - php

    extra_hosts:
      - "base-teste-api.localhost:host-gateway"

    working_dir: /var/www

    restart: unless-stopped

    networks:
      - web

  # Reverb: websockets (broadcasting).
  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    user: "1000:1000"

    command: php artisan reverb:start --host=0.0.0.0 --port=8080

    volumes:
      - ./:/var/www

    working_dir: /var/www

    restart: unless-stopped

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      - "traefik.http.routers.plannerate-reverb.rule=Host(`ws.plannerate.localhost`)"
      - "traefik.http.routers.plannerate-reverb.priority=100"
      - "traefik.http.services.plannerate-reverb.loadbalancer.server.port=8080"

    networks:
      - web

networks:
  web:
    external: true
    name: web
