services:
  # ============================================
  # Aplicação Laravel + Nginx
  # ============================================
  app:
    image: ghcr.io/${GITHUB_REPO}:main
    container_name: plannerate-app-prod
    restart: always
    
    volumes:
      - ./.env:/var/www/.env:ro
      - storage-data:/var/www/storage/app/public
      - storage-private:/var/www/storage/app/private
      - ./php-config/memory-limit.ini:/usr/local/etc/php/conf.d/memory-limit.ini:ro

    networks:
      - plannerate-prod
      - traefik-global
    environment:
      - VITE_PUSHER_APP_KEY=${VITE_PUSHER_APP_KEY}
      - VITE_PUSHER_APP_CLUSTER=${VITE_PUSHER_APP_CLUSTER:-mt1}
      - VITE_PUSHER_PORT=${VITE_PUSHER_PORT:-443}
      - VITE_PUSHER_SCHEME=${VITE_PUSHER_SCHEME:-https}
    
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-global"
      
      # Router para aplicação principal
      - "traefik.http.routers.prod-app.rule=Host(`${DOMAIN:-plannerate.com.br}`) || HostRegexp(`{subdomain:[a-z0-9-]+}.${DOMAIN:-plannerate.com.br}`)"
      - "traefik.http.routers.prod-app.entrypoints=websecure"
      - "traefik.http.routers.prod-app.tls.certresolver=letsencrypt"
      - "traefik.http.routers.prod-app.tls.domains[0].main=${DOMAIN:-plannerate.com.br}"
      - "traefik.http.routers.prod-app.tls.domains[0].sans=*.${DOMAIN:-plannerate.com.br}"
      - "traefik.http.routers.prod-app.priority=10"
      - "traefik.http.services.prod-app.loadbalancer.server.port=80"
      - "traefik.http.middlewares.prod-security.headers.browserXssFilter=true"
      - "traefik.http.middlewares.prod-security.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.prod-security.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.prod-security.headers.stsSeconds=31536000"
      - "traefik.http.routers.prod-app.middlewares=prod-security"
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/up"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    
    depends_on:
      redis:
        condition: service_healthy

  # ============================================
  # PostgreSQL - SERVIDOR EXTERNO
  # ============================================
  # O PostgreSQL agora roda em um servidor externo (192.168.2.106)
  # com replicação (1 primário + 2 réplicas).
  # Configuração em: postgres-replicas/
  # 
  # Para conectar, configure no .env.production:
  # DB_HOST=192.168.2.106
  # DB_PORT=5432
  # DB_DATABASE=plannerate_production
  # DB_USERNAME=replicator
  # DB_PASSWORD=replicator_password
  # ============================================

  # ============================================
  # Redis Cache & Queue
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: plannerate-redis-prod
    restart: unless-stopped
    
    command: >
      redis-server
      --appendonly yes
      ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
      --maxmemory 4gb
      --maxmemory-policy allkeys-lru
      --save 900 1 300 10 60 10000
      --auto-aof-rewrite-percentage 100
      --auto-aof-rewrite-min-size 1gb
    
    volumes:
      - redis_data:/data
    
    networks:
      - plannerate-prod
    
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Reverb foi substituido por Pusher

  # ============================================
  # pgAdmin (Database Management)
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: plannerate-pgadmin-prod
    restart: unless-stopped
    
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@plannerate.com.br}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'True'
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: 'False'
      PGADMIN_CONFIG_COOKIE_SAMESITE: "'Lax'"
    
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    
    networks:
      - plannerate-prod
      - traefik-global
    
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-global"
      - "traefik.http.routers.prod-pgadmin.rule=Host(`pgadmin.${DOMAIN:-plannerate.com.br}`)"
      - "traefik.http.routers.prod-pgadmin.entrypoints=websecure"
      - "traefik.http.routers.prod-pgadmin.tls.certresolver=letsencrypt"
      - "traefik.http.routers.prod-pgadmin.priority=50"
      - "traefik.http.services.prod-pgadmin.loadbalancer.server.port=80"
    
    # Conecta ao PostgreSQL externo (192.168.2.106)
    # Servidor: 192.168.2.106
    # Database: plannerate_production
    # User: replicator
    # Password: replicator_password

  # ============================================
  # Queue Worker (Laravel)
  # ============================================
  queue:
    image: ghcr.io/${GITHUB_REPO}:main
    container_name: plannerate-queue-prod
    restart: always

    volumes:
      - ./.env:/var/www/.env:ro
      - storage-data:/var/www/storage/app/public
      - storage-private:/var/www/storage/app/private
      - ./php-config/memory-limit.ini:/usr/local/etc/php/conf.d/memory-limit.ini:ro

    networks:
      - plannerate-prod
    
    command: php artisan horizon
    
    healthcheck:
      test: ["CMD-SHELL", "php -r \"echo 'ok';\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    
    depends_on:
      redis:
        condition: service_healthy

  # ============================================
  # Scheduler (Laravel Cron)
  # ============================================
  scheduler:
    image: ghcr.io/${GITHUB_REPO}:main
    container_name: plannerate-scheduler-prod
    restart: always

    volumes:
      - ./.env:/var/www/.env:ro
      - storage-data:/var/www/storage/app/public
      - storage-private:/var/www/storage/app/private
      - ./php-config/memory-limit.ini:/usr/local/etc/php/conf.d/memory-limit.ini:ro

    networks:
      - plannerate-prod
    
    command: >
      sh -c "while true; do
        php artisan schedule:run --verbose --no-interaction &
        sleep 60
      done"
    
    healthcheck:
      test: ["CMD-SHELL", "php -r \"echo 'ok';\" || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 2
      start_period: 10s
    
    depends_on:
      redis:
        condition: service_healthy

# ============================================
# Networks
# ============================================
networks:
  plannerate-prod:
    driver: bridge
    name: plannerate-prod
  
  traefik-global:
    external: true

# ============================================
# Volumes (Persistência de Dados)
# ============================================
volumes:
  # postgres_data removido - PostgreSQL agora é externo (192.168.2.106)
  redis_data:
    driver: local
  pgadmin_data:
    driver: local
  storage-data:
    driver: local
  # Compartilhado entre app, queue e scheduler (ex.: ProcessAdvancedImport .xlsx)
  storage-private:
    driver: local
