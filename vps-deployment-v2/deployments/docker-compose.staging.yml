services:
  app:
    image: ghcr.io/${GHCR_REPO}:${IMAGE_TAG:-latest}
    restart: always
    env_file:
      - ./.env
    volumes:
      - ./.env:/var/www/.env:ro
      - stg_storage_data:/var/www/storage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - stg-network
      - traefik-global
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-global"
      - "traefik.http.routers.${APP_SLUG:-staging}-app.rule=Host(`${DOMAIN}`) || HostRegexp(`{subdomain:[a-z0-9-]+}.${DOMAIN}`)"
      - "traefik.http.routers.${APP_SLUG:-staging}-app.entrypoints=websecure"
      - "traefik.http.routers.${APP_SLUG:-staging}-app.tls=true"
      - "traefik.http.routers.${APP_SLUG:-staging}-app.tls.certresolver=letsencrypt"
      - "traefik.http.routers.${APP_SLUG:-staging}-app.priority=1"
      - "traefik.http.services.${APP_SLUG:-staging}-app.loadbalancer.server.port=80"
      - "traefik.http.middlewares.${APP_SLUG:-staging}-sec.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.${APP_SLUG:-staging}-sec.headers.browserXssFilter=true"
      - "traefik.http.middlewares.${APP_SLUG:-staging}-sec.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.${APP_SLUG:-staging}-sec.headers.frameDeny=true"
      - "traefik.http.routers.${APP_SLUG:-staging}-app.middlewares=${APP_SLUG:-staging}-sec"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/up"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    depends_on:
      redis:
        condition: service_healthy

  queue:
    image: ghcr.io/${GHCR_REPO}:${IMAGE_TAG:-latest}
    restart: always
    env_file:
      - ./.env
    volumes:
      - ./.env:/var/www/.env:ro
      - stg_storage_data:/var/www/storage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    networks:
      - stg-network
    depends_on:
      redis:
        condition: service_healthy

  scheduler:
    image: ghcr.io/${GHCR_REPO}:${IMAGE_TAG:-latest}
    restart: always
    env_file:
      - ./.env
    volumes:
      - ./.env:/var/www/.env:ro
      - stg_storage_data:/var/www/storage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: php artisan schedule:work
    networks:
      - stg-network
    depends_on:
      redis:
        condition: service_healthy

  reverb:
    image: ghcr.io/${GHCR_REPO}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - ./.env
    volumes:
      - ./.env:/var/www/.env:ro
      - stg_storage_data:/var/www/storage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    networks:
      - stg-network
      - traefik-global
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-global"
      - "traefik.http.routers.${APP_SLUG:-staging}-reverb.rule=Host(`${REVERB_DOMAIN}`)"
      - "traefik.http.routers.${APP_SLUG:-staging}-reverb.entrypoints=websecure"
      - "traefik.http.routers.${APP_SLUG:-staging}-reverb.tls=true"
      - "traefik.http.routers.${APP_SLUG:-staging}-reverb.tls.certresolver=letsencrypt"
      - "traefik.http.routers.${APP_SLUG:-staging}-reverb.priority=25"
      - "traefik.http.services.${APP_SLUG:-staging}-reverb.loadbalancer.server.port=8080"
      - "traefik.http.middlewares.${APP_SLUG:-staging}-reverb-ratelimit.ratelimit.average=90"
      - "traefik.http.middlewares.${APP_SLUG:-staging}-reverb-ratelimit.ratelimit.burst=180"
      - "traefik.http.middlewares.${APP_SLUG:-staging}-reverb-inflight.inflightreq.amount=60"
      - "traefik.http.routers.${APP_SLUG:-staging}-reverb.middlewares=${APP_SLUG:-staging}-reverb-ratelimit,${APP_SLUG:-staging}-reverb-inflight"
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
    volumes:
      - stg_redis_data:/data
    networks:
      - stg-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ${REDIS_PASSWORD:+-a $REDIS_PASSWORD} ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  stg-network:
    driver: bridge
  traefik-global:
    external: true

volumes:
  stg_redis_data:
    driver: local
  stg_storage_data:
    driver: local
