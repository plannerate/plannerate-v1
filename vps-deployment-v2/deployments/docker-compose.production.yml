services:
  app:
    image: ghcr.io/${GHCR_REPO}:${IMAGE_TAG:-latest}
    restart: always
    env_file:
      - ./.env
    volumes:
      - ./.env:/var/www/.env:ro
    networks:
      - prod-network
      - traefik-global
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-global"
      - "traefik.http.routers.${APP_SLUG:-production}-app.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.${APP_SLUG:-production}-app.entrypoints=websecure"
      - "traefik.http.routers.${APP_SLUG:-production}-app.tls=true"
      - "traefik.http.routers.${APP_SLUG:-production}-app.tls.certresolver=letsencrypt"
      - "traefik.http.routers.${APP_SLUG:-production}-app.priority=30"
      - "traefik.http.services.${APP_SLUG:-production}-app.loadbalancer.server.port=80"
      - "traefik.http.middlewares.${APP_SLUG:-production}-sec.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.${APP_SLUG:-production}-sec.headers.browserXssFilter=true"
      - "traefik.http.middlewares.${APP_SLUG:-production}-sec.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.${APP_SLUG:-production}-sec.headers.frameDeny=true"
      - "traefik.http.routers.${APP_SLUG:-production}-app.middlewares=${APP_SLUG:-production}-sec"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/up"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    depends_on:
      redis:
        condition: service_healthy

  queue:
    image: ghcr.io/${GHCR_REPO}:${IMAGE_TAG:-latest}
    restart: always
    env_file:
      - ./.env
    volumes:
      - ./.env:/var/www/.env:ro
    command: php artisan horizon
    networks:
      - prod-network
    depends_on:
      redis:
        condition: service_healthy

  scheduler:
    image: ghcr.io/${GHCR_REPO}:${IMAGE_TAG:-latest}
    restart: always
    env_file:
      - ./.env
    volumes:
      - ./.env:/var/www/.env:ro
    command: php artisan schedule:work
    networks:
      - prod-network
    depends_on:
      redis:
        condition: service_healthy

  reverb:
    image: ghcr.io/${GHCR_REPO}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - ./.env
    volumes:
      - ./.env:/var/www/.env:ro
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    networks:
      - prod-network
      - traefik-global
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-global"
      - "traefik.http.routers.${APP_SLUG:-production}-reverb.rule=Host(`${REVERB_DOMAIN}`)"
      - "traefik.http.routers.${APP_SLUG:-production}-reverb.entrypoints=websecure"
      - "traefik.http.routers.${APP_SLUG:-production}-reverb.tls=true"
      - "traefik.http.routers.${APP_SLUG:-production}-reverb.tls.certresolver=letsencrypt"
      - "traefik.http.routers.${APP_SLUG:-production}-reverb.priority=35"
      - "traefik.http.services.${APP_SLUG:-production}-reverb.loadbalancer.server.port=8080"
      - "traefik.http.middlewares.${APP_SLUG:-production}-reverb-ratelimit.ratelimit.average=120"
      - "traefik.http.middlewares.${APP_SLUG:-production}-reverb-ratelimit.ratelimit.burst=240"
      - "traefik.http.middlewares.${APP_SLUG:-production}-reverb-inflight.inflightreq.amount=100"
      - "traefik.http.routers.${APP_SLUG:-production}-reverb.middlewares=${APP_SLUG:-production}-reverb-ratelimit,${APP_SLUG:-production}-reverb-inflight"
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
    volumes:
      - prod_redis_data:/data
    networks:
      - prod-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ${REDIS_PASSWORD:+-a $REDIS_PASSWORD} ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  prod-network:
    driver: bridge
  traefik-global:
    external: true

volumes:
  prod_redis_data:
    driver: local
