global:
  resolve_timeout: 5m

route:
  receiver: webhook-default
  group_by: ['alertname', 'instance', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity="critical"
      receiver: webhook-critical
    - matchers:
        - severity="warning"
      receiver: webhook-warning

receivers:
  - name: webhook-default
    webhook_configs:
      - url: ${ALERT_WEBHOOK_DEFAULT_URL}
        send_resolved: true

  - name: webhook-warning
    webhook_configs:
      - url: ${ALERT_WEBHOOK_WARNING_URL}
        send_resolved: true

  - name: webhook-critical
    webhook_configs:
      - url: ${ALERT_WEBHOOK_CRITICAL_URL}
        send_resolved: true
