groups:
  - name: host-and-stack
    rules:
      - alert: NodeExporterDown
        expr: up{job='node-exporter'} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Node exporter is down
          description: Node exporter has been unreachable for 2 minutes.

      - alert: HighCpuUsage
        expr: (100 - (avg by(instance) (rate(node_cpu_seconds_total{mode='idle'}[5m])) * 100)) > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: High CPU usage
          description: CPU usage has been above 85 percent for 10 minutes.

      - alert: HighMemoryUsage
        expr: (1 - ((node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes))) * 100 > 90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: High memory usage
          description: Memory usage has been above 90 percent for 10 minutes.

      - alert: LowDiskSpace
        expr: (node_filesystem_avail_bytes{fstype!~'tmpfs|overlay'} / node_filesystem_size_bytes{fstype!~'tmpfs|overlay'}) * 100 < 15
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Low disk space
          description: Free disk space dropped below 15 percent.

      - alert: AppHealthEndpointFailing
        expr: probe_success{job='blackbox-http'} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Health endpoint is failing
          description: One of the monitored health endpoints is failing for more than 2 minutes.
