groups:
  - name: host-and-stack
    rules:
      - alert: NodeExporterDown
        expr: up{job='node-exporter'} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Node exporter is down
          description: Node exporter has been unreachable for 2 minutes.

      - alert: HighCpuUsage
        expr: (100 - (avg by(instance) (rate(node_cpu_seconds_total{mode='idle'}[5m])) * 100)) > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: High CPU usage
          description: CPU usage has been above 85 percent for 10 minutes.

      - alert: HighMemoryUsage
        expr: (1 - ((node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes))) * 100 > 90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: High memory usage
          description: Memory usage has been above 90 percent for 10 minutes.

      - alert: LowDiskSpace
        expr: (node_filesystem_avail_bytes{fstype!~'tmpfs|overlay'} / node_filesystem_size_bytes{fstype!~'tmpfs|overlay'}) * 100 < 15
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Low disk space
          description: Free disk space dropped below 15 percent.

      - alert: AppHealthEndpointFailing
        expr: probe_success{job='blackbox-http'} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Health endpoint is failing
          description: One of the monitored health endpoints is failing for more than 2 minutes.

  - name: application
    rules:
      - alert: LaravelMetricsDown
        expr: up{job='laravel-app'} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Laravel /metrics endpoint is unreachable
          description: Prometheus cannot scrape the app /metrics endpoint for 5 minutes (app down, token wrong, or route missing).

      - alert: HorizonDown
        expr: plannerate_horizon_up == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: Horizon has no active master supervisor
          description: Horizon reports no running master supervisor for 5 minutes — queued jobs are not being processed.

      - alert: HorizonQueueBacklog
        expr: plannerate_horizon_queue_pending > 500
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Horizon queue backlog
          description: Queue {{ $labels.queue }} has more than 500 pending jobs for 10 minutes. Adjust the threshold after observing the real baseline.

      - alert: HorizonFailedJobsGrowing
        expr: increase(plannerate_horizon_failed_jobs_total[15m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: Horizon failed jobs increasing
          description: The failed_jobs table grew in the last 15 minutes — investigate recent job failures.
