services:
  prometheus:
    image: prom/prometheus:v3.4.2
    container_name: plannerate-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}'
      - '--web.enable-lifecycle'
      - '--web.external-url=https://${PROMETHEUS_DOMAIN}'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    networks:
      - monitoring
      - traefik-global
    labels:
      - 'traefik.enable=true'
      - 'traefik.docker.network=traefik-global'
      - 'traefik.http.routers.prometheus.rule=Host(`${PROMETHEUS_DOMAIN}`)'
      - 'traefik.http.routers.prometheus.entrypoints=websecure'
      - 'traefik.http.routers.prometheus.tls.certresolver=letsencrypt'
      - 'traefik.http.routers.prometheus.priority=14'
      - 'traefik.http.services.prometheus.loadbalancer.server.port=9090'

  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: plannerate-alertmanager
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=https://${ALERTMANAGER_DOMAIN}'
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    networks:
      - monitoring
      - traefik-global
    labels:
      - 'traefik.enable=true'
      - 'traefik.docker.network=traefik-global'
      - 'traefik.http.routers.alertmanager.rule=Host(`${ALERTMANAGER_DOMAIN}`)'
      - 'traefik.http.routers.alertmanager.entrypoints=websecure'
      - 'traefik.http.routers.alertmanager.tls.certresolver=letsencrypt'
      - 'traefik.http.routers.alertmanager.priority=14'
      - 'traefik.http.services.alertmanager.loadbalancer.server.port=9093'

  grafana:
    image: grafana/grafana:12.0.2
    container_name: plannerate-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SERVER_ROOT_URL=https://${GRAFANA_DOMAIN}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - monitoring
      - traefik-global
    labels:
      - 'traefik.enable=true'
      - 'traefik.docker.network=traefik-global'
      - 'traefik.http.routers.grafana.rule=Host(`${GRAFANA_DOMAIN}`)'
      - 'traefik.http.routers.grafana.entrypoints=websecure'
      - 'traefik.http.routers.grafana.tls.certresolver=letsencrypt'
      - 'traefik.http.routers.grafana.priority=15'
      - 'traefik.http.services.grafana.loadbalancer.server.port=3000'

  node-exporter:
    image: prom/node-exporter:v1.9.1
    container_name: plannerate-node-exporter
    restart: unless-stopped
    command:
      - '--path.rootfs=/host'
    volumes:
      - /:/host:ro,rslave
    networks:
      - monitoring

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.0
    container_name: plannerate-cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - monitoring

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.27.0
    container_name: plannerate-blackbox-exporter
    restart: unless-stopped
    command:
      - '--config.file=/etc/blackbox_exporter/config.yml'
    volumes:
      - ./blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge
  traefik-global:
    external: true

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  alertmanager_data:
    driver: local
