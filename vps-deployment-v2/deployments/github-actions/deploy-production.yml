name: deploy-production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy"
        required: true
        default: "latest"

env:
  DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/opt/production' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy production stack
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.APP_HOST }}
          username: ${{ secrets.APP_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd ${{ env.DEPLOY_PATH }}
            export IMAGE_TAG=${{ github.event.inputs.image_tag }}
            docker compose pull
            docker compose up -d --force-recreate
            docker compose exec -T app sh -lc '
              set -e
              php artisan migrate --force --database=landlord --path=database/migrations/landlord

              set +e
              TENANTS_OUTPUT="$(php artisan tenants:artisan "migrate --force --database=tenant" 2>&1)"
              TENANTS_STATUS=$?
              set -e

              if [ "${TENANTS_STATUS}" -ne 0 ]; then
                if echo "${TENANTS_OUTPUT}" | grep -q "No tenant(s) found."; then
                  echo "No tenants found yet; skipping tenant migrations."
                else
                  echo "${TENANTS_OUTPUT}"
                  exit "${TENANTS_STATUS}"
                fi
              else
                echo "${TENANTS_OUTPUT}"
              fi
            '
            docker compose exec -T app php artisan optimize:clear
            docker compose ps

      - name: Health check
        run: curl -fsS https://${{ secrets.DOMAIN }}/up
