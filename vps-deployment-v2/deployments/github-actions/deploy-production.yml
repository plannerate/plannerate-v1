name: deploy-production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy"
        required: true
        default: "latest"

env:
  DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/opt/production' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy production stack
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.APP_HOST }}
          username: ${{ secrets.APP_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd ${{ env.DEPLOY_PATH }}
            export IMAGE_TAG=${{ github.event.inputs.image_tag }}
            docker compose pull
            docker compose up -d --force-recreate
            docker compose exec -T app sh -lc '
              mkdir -p storage/framework/views storage/framework/cache storage/framework/sessions bootstrap/cache
              chmod -R ug+rwX storage bootstrap/cache
              chown -R www-data:www-data storage bootstrap/cache 2>/dev/null || true
            '
            docker compose exec -T app sh -lc '
              set -e
              php artisan migrate --force --database=landlord --path=database/migrations/landlord

              set +e
              TENANTS_OUTPUT="$(php artisan tenants:artisan "migrate --force --database=tenant" 2>&1)"
              TENANTS_STATUS=$?
              set -e

              if [ "${TENANTS_STATUS}" -ne 0 ]; then
                if echo "${TENANTS_OUTPUT}" | grep -q "No tenant(s) found."; then
                  echo "No tenants found yet; skipping tenant migrations."
                else
                  echo "${TENANTS_OUTPUT}"
                  exit "${TENANTS_STATUS}"
                fi
              else
                echo "${TENANTS_OUTPUT}"
              fi
            '
            docker compose exec -T app php artisan optimize:clear
            docker compose ps

      - name: Health check (inside app container)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.APP_HOST }}
          username: ${{ secrets.APP_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd ${{ env.DEPLOY_PATH }}
            health_ok=0
            for outer_attempt in 1 2 3 4 5; do
              if docker compose exec -T app sh -lc '
                for attempt in 1 2 3 4 5; do
                  if curl -fsS http://127.0.0.1/up >/dev/null; then
                    echo "Health check passed on /up (attempt ${attempt})"
                    exit 0
                  fi
                  echo "Health check /up failed (attempt ${attempt}), retrying..."
                  sleep 3
                done

                if curl -fsSI http://127.0.0.1/ >/dev/null; then
                  echo "Warning: /up failed but / responded successfully"
                  exit 0
                fi

                echo "Health check failed for both /up and /"
                echo "---- /up response body ----"
                curl -sS http://127.0.0.1/up || true
                exit 1
              '; then
                health_ok=1
                break
              fi

              echo "Health check command failed at container level (attempt ${outer_attempt}), retrying..."
              docker compose ps || true
              sleep 4
            done

            if [[ "${health_ok}" -ne 1 ]]; then
              echo "Health check failed after retries"
              docker compose logs app --tail=120 || true
              exit 1
            fi
            echo "Health check finished inside app container"
