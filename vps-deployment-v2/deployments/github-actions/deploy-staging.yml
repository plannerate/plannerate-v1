name: deploy-staging

on:
  workflow_run:
    workflows: ["build-push-image"]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (example sha-abcdef1). Leave empty to use workflow_run head SHA."
        required: false
        default: ""

env:
  DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/opt/staging' }}

jobs:
  deploy:
    if: >
      (
        github.event_name == 'workflow_dispatch' &&
        github.ref_name == 'dev'
      ) ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'dev'
      )
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy staging stack
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.APP_HOST }}
          username: ${{ secrets.APP_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            echo "WORKFLOW_VERSION=deploy-staging-landlord-only-2026-05-03"
            cd ${{ env.DEPLOY_PATH }}
            export IMAGE_TAG=${{ github.event.inputs.image_tag || 'latest' }}
            docker compose pull
            docker compose up -d --force-recreate
            docker compose exec -T app sh -lc '
              mkdir -p storage/framework/views storage/framework/cache storage/framework/sessions bootstrap/cache
              chmod -R ug+rwX storage bootstrap/cache
              chown -R www-data:www-data storage bootstrap/cache 2>/dev/null || true
            '
            docker compose exec -T app sh -lc '
              set -e
              php artisan optimize:clear
            '
            docker compose exec -T app sh -lc '
              set -e
              if [ ! -f .env ]; then
                echo "Missing .env in ${PWD}. Expected deploy env file."
                exit 1
              fi

              missing=0
              for key in DB_CONNECTION DB_DATABASE DB_LANDLORD_CONNECTION DB_LANDLORD_DATABASE; do
                if ! grep -q "^${key}=" .env; then
                  echo "Missing ${key} in .env"
                  missing=1
                fi
              done

              if [ "${missing}" -ne 0 ]; then
                echo "Invalid .env for deployment. Expected landlord DB settings."
                exit 1
              fi

              echo "Deployment DB settings:"
              grep -E "^(DB_CONNECTION|DB_DATABASE|DB_LANDLORD_CONNECTION|DB_LANDLORD_DATABASE)=" .env
            '
            docker compose exec -T app sh -lc '
              set -e
              DB_CONNECTION=landlord DB_DATABASE="${DB_LANDLORD_DATABASE:-$DB_DATABASE}" php artisan migrate --force --database=landlord --path=database/migrations/landlord
            '
            docker compose exec -T app php artisan optimize:clear
            docker compose ps

      - name: Health check (inside app container)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.APP_HOST }}
          username: ${{ secrets.APP_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd ${{ env.DEPLOY_PATH }}
            health_ok=0
            for outer_attempt in 1 2 3 4 5; do
              if docker compose exec -T app sh -lc '
                for attempt in 1 2 3 4 5; do
                  if curl -fsS http://127.0.0.1/up >/dev/null; then
                    echo "Health check passed on /up (attempt ${attempt})"
                    exit 0
                  fi
                  echo "Health check /up failed (attempt ${attempt}), retrying..."
                  sleep 3
                done

                if curl -fsSI http://127.0.0.1/ >/dev/null; then
                  echo "Warning: /up failed but / responded successfully"
                  exit 0
                fi

                echo "Health check failed for both /up and /"
                echo "---- /up response body ----"
                curl -sS http://127.0.0.1/up || true
                exit 1
              '; then
                health_ok=1
                break
              fi

              echo "Health check command failed at container level (attempt ${outer_attempt}), retrying..."
              docker compose ps || true
              sleep 4
            done

            if [[ "${health_ok}" -ne 1 ]]; then
              echo "Health check failed after retries"
              docker compose logs app --tail=120 || true
              exit 1
            fi
            echo "Health check finished inside app container"
