name: rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to rollback"
        required: true
        type: choice
        options:
          - staging
          - production
      image_tag:
        description: "Previous image tag"
        required: true

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Rollback stack
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.APP_HOST }}
          username: ${{ secrets.APP_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            if [[ "${{ github.event.inputs.environment }}" == "staging" ]]; then
              DEPLOY_PATH=/opt/staging
            else
              DEPLOY_PATH=/opt/production
            fi
            cd ${DEPLOY_PATH}
            export IMAGE_TAG=${{ github.event.inputs.image_tag }}
            docker compose pull
            docker compose up -d --force-recreate
            docker compose exec -T app sh -lc '
              set -e
              php artisan migrate --force --database=landlord --path=database/migrations/landlord

              set +e
              TENANTS_OUTPUT="$(php artisan tenants:artisan "migrate --force --database=tenant" 2>&1)"
              TENANTS_STATUS=$?
              set -e

              if [ "${TENANTS_STATUS}" -ne 0 ]; then
                if echo "${TENANTS_OUTPUT}" | grep -q "No tenant(s) found."; then
                  echo "No tenants found yet; skipping tenant migrations."
                else
                  echo "${TENANTS_OUTPUT}"
                  exit "${TENANTS_STATUS}"
                fi
              else
                echo "${TENANTS_OUTPUT}"
              fi
            '
            docker compose exec -T app php artisan optimize:clear
            docker compose ps

      - name: Health check
        run: curl -fsS https://${{ secrets.DOMAIN }}/up
