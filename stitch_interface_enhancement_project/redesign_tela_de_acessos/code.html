<!DOCTYPE html>

<html class="h-full bg-[#0a0c12]" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Acessos do Tenant - Alfa</title>
<!-- BEGIN: Tailwind CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- END: Tailwind CDN -->
<!-- BEGIN: Tailwind Configuration -->
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              dark: '#0a0c12',
              card: '#11141d',
              input: '#151926',
              border: '#1e2330',
              lime: '#a3e635',
              'lime-hover': '#bef264',
              danger: '#991b1b',
            }
          },
          backgroundImage: {
            'lime-gradient': 'linear-gradient(90deg, #4d7c0f 0%, #a3e635 100%)',
          }
        }
      }
    }
  </script>
<!-- END: Tailwind Configuration -->
<style data-purpose="custom-typography">
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body {
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
<style data-purpose="utility-styles">
    /* Custom focus states and input styling */
    .custom-input-focus:focus {
      outline: none;
      border-color: #a3e635;
      ring: 1px solid #a3e635;
    }
    .safe-area-bottom {
      padding-bottom: env(safe-area-inset-bottom);
    }
  </style>
</head>
<body class="text-gray-200 antialiased h-full">
<!-- BEGIN: MainContainer -->
<main class="flex flex-col min-h-screen px-4 pt-8 pb-12 overflow-y-auto">
<!-- BEGIN: HeaderSection -->
<header class="mb-6" data-purpose="page-header">
<div class="flex items-start justify-between mb-2">
<h1 class="text-xl font-bold text-white tracking-tight">Acessos do tenant - Alfa</h1>
<!-- Small Logo or Indicator as seen in top left of reference -->
<div class="p-1 border border-brand-border rounded">
<div class="w-2 h-2 bg-brand-lime rounded-sm"></div>
</div>
</div>
<p class="text-sm text-gray-400">Gerencie os usuários e perfis de acesso deste tenant.</p>
</header>
<!-- END: HeaderSection -->
<!-- BEGIN: StatsGrid -->
<section class="grid grid-cols-2 gap-3 mb-6" data-purpose="statistics-overview">
<!-- Users Count -->
<div class="bg-brand-card border border-brand-border rounded-xl p-4 flex flex-col justify-between h-28">
<span class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Usuários</span>
<span class="text-2xl font-bold text-white">1</span>
</div>
<!-- Plan Limit -->
<div class="bg-brand-card border border-brand-border rounded-xl p-4 flex flex-col justify-between h-28">
<span class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Limite do plano</span>
<div class="flex items-baseline gap-1">
<span class="text-2xl font-bold text-white">2</span>
<span class="text-xs text-gray-500 font-medium ml-auto">1 / 2</span>
</div>
</div>
</section>
<!-- END: StatsGrid -->
<!-- BEGIN: PrimaryAction -->
<section class="mb-6" data-purpose="main-actions">
<button class="w-full py-3 px-4 rounded-lg bg-lime-gradient text-brand-dark font-bold text-sm shadow-lg shadow-brand-lime/10 active:scale-[0.98] transition-transform">
        Novo usuário
      </button>
</section>
<!-- END: PrimaryAction -->
<!-- BEGIN: FilterSection -->
<section class="space-y-3 mb-8" data-purpose="search-and-filters">
<!-- Search Input -->
<div class="relative">
<input class="w-full bg-brand-input border-brand-border text-sm rounded-lg py-3 px-4 text-gray-300 placeholder:text-gray-600 focus:border-brand-lime focus:ring-1 focus:ring-brand-lime transition-all" placeholder="Buscar por nome ou email..." type="text"/>
</div>
<div class="flex gap-2">
<!-- Dropdown Filter -->
<div class="flex-grow">
<select class="w-full bg-brand-input border-brand-border text-sm rounded-lg py-3 px-4 text-gray-300 focus:border-brand-lime focus:ring-1 focus:ring-brand-lime appearance-none">
<option>Todos</option>
<option>Ativos</option>
<option>Inativos</option>
</select>
</div>
<!-- Filter Submit Button -->
<button class="px-6 py-3 rounded-lg bg-brand-lime/10 border border-brand-lime/30 text-brand-lime font-semibold text-sm active:bg-brand-lime/20">
          Filtrar
        </button>
</div>
</section>
<!-- END: FilterSection -->
<!-- BEGIN: UserList -->
<section class="space-y-4" data-purpose="user-results-list">
<h2 class="text-xs font-bold text-gray-500 uppercase tracking-widest px-1">Resultados</h2>
<!-- BEGIN: UserCard -->
<div class="bg-brand-card border border-brand-border rounded-xl p-5 shadow-sm" data-purpose="user-card">
<!-- User Identity -->
<div class="flex items-center gap-4 mb-4">
<div class="w-12 h-12 rounded-full bg-brand-lime/20 flex items-center justify-center text-brand-lime font-bold text-lg border border-brand-lime/30">
            AA
          </div>
<div class="flex flex-col">
<div class="flex items-center gap-2">
<span class="font-bold text-white">Administrador Alfa</span>
<span class="text-[10px] px-2 py-0.5 rounded-full bg-brand-lime/10 text-brand-lime border border-brand-lime/20 font-bold uppercase">Ativo</span>
</div>
<span class="text-sm text-gray-500">admin@alfa.plannerate-v1.test</span>
</div>
</div>
<!-- Profile Tags -->
<div class="mb-6">
<span class="text-[11px] px-3 py-1 rounded bg-brand-input border border-brand-border text-gray-400 font-medium">
            Nenhum perfil
          </span>
</div>
<!-- User Actions -->
<div class="flex items-center gap-2 pt-4 border-t border-brand-border">
<button class="flex-1 py-2 px-3 rounded bg-brand-input border border-brand-border text-xs font-bold text-gray-300 active:bg-brand-border transition-colors">
            Editar
          </button>
<button class="flex-1 py-2 px-3 rounded bg-brand-input border border-brand-border text-xs font-bold text-gray-300 active:bg-brand-border transition-colors">
            Inativo
          </button>
<button class="flex-1 py-2 px-3 rounded bg-brand-danger text-white text-xs font-bold active:brightness-90 transition-all">
            Excluir
          </button>
</div>
</div>
<!-- END: UserCard -->
</section>
<!-- END: UserList -->
<!-- Spacer for safe area -->
<div class="safe-area-bottom"></div>
</main>
<!-- END: MainContainer -->
</body></html>
